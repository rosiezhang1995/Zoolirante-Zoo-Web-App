<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details - Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">

    <div class="container max-w-5xl mx-auto px-4 pt-6 mt-3">
        <div class="flex justify-between items-center">

            <button onclick="backToEvents()" class="bg-zoo-primary hover:!bg-amber-700 text-zoo-cream px-4 py-2 rounded-lg transition flex items-center">
                ← Back to Events
            </button>

            <div class="flex gap-3">
                <button class="w-28 border-2 border-zoo-primary text-zoo-primary hover:!bg-amber-700 hover-white px-4 py-2 rounded-lg transition">
                    Edit
                </button>
                <button class="w-28 border-2 border-zoo-primary text-zoo-primary hover:!bg-amber-700 hover-white px-4 py-2 rounded-lg transition">
                    Delete
                </button>
            </div>

        </div>
    </div>


    <!-- title -->
    <div class="relative max-w-5xl mx-auto h-36 overflow-hidden">

        <img src="/images/event-page/title.png"
             alt="Event Title"
             class="absolute inset-0 w-full h-full object-fill">

        <h1 id="event-title" class="relative z-10 text-4xl title-font font-bold text-zoo-brown text-center top-1/2 -translate-y-1/2 w-full">
            My Event Title
        </h1>
    </div>

    <div class="max-w-5xl mx-auto px-4 mt-6  flex justify-between text-center">

        <div class="flex flex-col items-center gap-2">
            <img src="/images/event-page/calendar.png" alt="Date" class="w-20 h-20 object-contain">
            <p id="event-date" class="text-lg font-medium text-zoo-brown">14 September 2025</p>
        </div>

        <div class="flex flex-col items-center gap-2">
            <img src="/images/event-page/clock.png" alt="Time" class="w-20 h-20 object-contain">
            <p id="event-time" class="text-lg font-medium text-zoo-brown">10:00 AM – 2:00 PM</p>
        </div>

        <div class="flex flex-col items-center gap-2">
            <img src="/images/event-page/pin.png" alt="Location" class="w-20 h-20 object-contain">
            <p id="event-location" class="text-lg font-medium text-zoo-brown">Main Safari Hall</p>
        </div>

    </div>

    <section class="max-w-5xl mx-auto mt-10 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <img id="event-image"
                 src="/images/events/kangaroo-interaction.jpg"
                 alt="Event Image"
                 class="w-full aspect-square object-cover rounded-lg shadow">
        </div>

        <div>
            <h2 class="text-2xl font-bold text-zoo-brown mb-4">About this Event</h2>
            <p id="event-description" class="text-gray-700 leading-relaxed mb-6">
                Join us for an unforgettable day at the zoo! Learn about wildlife conservation and meet some of our most beloved animals through interactive activities, talks, and close encounters.
            </p>

            <button class="px-6 py-3 bg-zoo-primary text-white hover:!bg-amber-700 rounded-lg transition">
                Save Event
            </button>
        </div>
    </section>

    <!-- Animals -->
    <section class="max-w-5xl mx-auto mt-8 p-6">
        <div class="flex items-center gap-4 my-10 max-w-4xl mx-auto">
            <div class="flex-grow h-px bg-zoo-primary"></div>
            <h2 class="text-xl title-font font-bold text-zoo-primary whitespace-nowrap">Animals in this Event</h2>
            <div class="flex-grow h-px bg-zoo-primary"></div>
        </div>

        <div id="event-animals" class="flex flex-wrap justify-center gap-6"></div>
    </section>


    <script src="/js/components/navbar.js"></script>
    <script src="/js/data/event-data.js"></script>
    <script src="/js/event-details.js"></script>
</body>
</html>
