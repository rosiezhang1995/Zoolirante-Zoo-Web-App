<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details - Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div class="p-4">
        <button onclick=""
                class="px-3 py-1 text-sm text-gray-700 border border-gray-300 rounded hover:bg-gray-100">
            ← Back
        </button>
    </div>

  
    <div class="text-white py-6">
        <div class="bg-zoo-primary max-w-5xl mx-auto text-center">
            <h1 class="text-3xl font-bold">Event Title</h1>
        </div>
    </div>

    <!-- Event Details -->
    <section class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 p-6 bg-white shadow mt-8 rounded-lg">
        <div>
            <img src="/images/events/sample-event.jpg"
                 alt="Event Image"
                 class="w-full aspect-square object-cover rounded-lg shadow">
        </div>
        <div class="flex flex-col gap-4">
            <!-- Date -->
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-lg font-medium">14 September 2025</p>
            </div>

            <!-- Time -->
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-lg font-medium">10:00 AM – 2:00 PM</p>
            </div>

            <!-- Location -->
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5s-3 1.343-3 3 1.343 3 3 3z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 22s8-4.5 8-11a8 8 0 10-16 0c0 6.5 8 11 8 11z" />
                </svg>
                <p class="text-lg font-medium">Main Safari Hall</p>
            </div>

            <!-- Description -->
            <div>
                <h2 class="text-sm text-gray-500 uppercase mb-1">Description</h2>
                <p class="text-gray-700 leading-relaxed">
                    Join us for an exciting wildlife conservation event filled with fun activities, talks, and close encounters with some of our most beloved animals.
                </p>
            </div>

        </div>

    </section>

    <!-- Animals -->
    <section class="max-w-5xl mx-auto mt-12 p-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Animals in this Event</h2>

        <div class="flex flex-wrap justify-center gap-6">
            <!-- animal card -->
            <div class="w-40">
                <img src="/images/animals/Lion.png"
                     alt="Lion"
                     class="w-full aspect-square object-cover rounded-lg shadow">
                <p class="mt-2 text-center font-medium">Lion</p>
            </div>

            <div class="w-40">
                <img src="/images/animals/Giraffe.png"
                     alt="Giraffe"
                     class="w-full aspect-square object-cover rounded-lg shadow">
                <p class="mt-2 text-center font-medium">Giraffe</p>
            </div>

            <div class="w-40">
                <img src="/images/animals/Monkey.png"
                     alt="Monkey"
                     class="w-full aspect-square object-cover rounded-lg shadow">
                <p class="mt-2 text-center font-medium">Monkey</p>
            </div>
        </div>
    </section>

</body>
</html>
