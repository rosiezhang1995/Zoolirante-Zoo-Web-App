<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>User Account — Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div class="flex min-h-screen bg-zoo-background">

        <!-- Tabs -->
        <div class="w-80 xl:w-96 p-4 flex flex-col items-center bg-zoo-lightpink">
            <!-- image -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-15 h-15 rounded-full mb-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            <!-- name -->
            <p id="username" class="font-semibold text-lg mb-4"></p>

            <!-- buttons -->
            <div class="w-full space-y-3 mt-4">
                <button class="tab-btn active flex items-center space-x-2" data-tab="profile">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <span>My Profile</span>
                </button>

                <button class="tab-btn flex items-center space-x-2" data-tab="animals">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                    </svg>
                    <span>Favourite Animals</span>
                </button>

                <button class="tab-btn flex items-center space-x-3" data-tab="events">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
                    </svg>
                    <span>Saved Events</span>
                </button>

                <button class="tab-btn flex items-center space-x-3" data-tab="orders">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                    <span>Order History</span>
                </button>

                <button class="tab-btn flex items-center space-x-3" data-tab="tickets">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z" />
                    </svg>
                    <span>My Tickets</span>
                </button>

                <button class="tab-btn flex items-center space-x-3" data-tab="membership">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" />
                    </svg>
                    <span>Membership</span>
                </button>

                <button class="tab-btn flex items-center space-x-3" data-tab="payment">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" />
                    </svg>
                    <span>Billing Info</span>
                </button>
            </div>

            <!-- Back to Home -->
            <div class="w-full mt-6 pt-4 border-t">
                <a href="/" class="tab-btn flex space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                    </svg>
                    <span>Home</span>
                </a>
            </div>

            <!-- Log Out -->
            <button class="tab-btn flex items-center space-x-3" id="logoutBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
                </svg>
                <span>Log Out</span>
            </button>
        </div>

        <!-- content -->
        <div class="flex-1 p-10">
            <!-- Profile -->
            <div id="profile" class="tab-content">
                <div class="max-w-7xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl mb-4">
                        My Profile
                    </div>

                    <div class="bg-white shadow-lg rounded-lg overflow-hidden">
                        <table class="table-auto w-full text-left border-collapse">
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <th class="bg-zoo-lightpink px-6 py-3 font-semibold text-zoo-darkbrown w-1/3">Username</th>
                                    <td id="profile-username" class="px-6 py-3 text-gray-700"></td>
                                </tr>
                                <tr>
                                    <th class="bg-zoo-lightpink px-6 py-3 font-semibold text-zoo-darkbrown">Full Name</th>
                                    <td id="profile-fullname" class="px-6 py-3 text-gray-700"></td>
                                </tr>
                                <tr>
                                    <th class="bg-zoo-lightpink px-6 py-3 font-semibold text-zoo-darkbrown">Address</th>
                                    <td id="profile-address" class="px-6 py-3 text-gray-700"></td>
                                </tr>
                                <tr>
                                    <th class="bg-zoo-lightpink px-6 py-3 font-semibold text-zoo-darkbrown">Email</th>
                                    <td id="profile-email" class="px-6 py-3 text-gray-700"></td>
                                </tr>
                                <tr>
                                    <th class="bg-zoo-lightpink px-6 py-3 font-semibold text-zoo-darkbrown">Phone</th>
                                    <td id="profile-phone" class="px-6 py-3 text-gray-700"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>


            <!-- Animals -->
            <div id="animals" class="tab-content hidden">
                <div class="max-w-7xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Favourite Animals
                    </div>
                    <div id="favourite-animals-list" class="space-y-6"></div>
                </div>
            </div>

            <!-- Events -->
            <div id="events" class="tab-content hidden">
                <div class="max-w-7xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 mb-3 text-center text-xl">
                        Saved Events
                    </div>
                    <div id="saved-events-list" class="space-y-6"></div>
                </div>
            </div>

            <!-- Orders -->
            <div id="orders" class="tab-content hidden">
                <div class="max-w-7xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Order History
                    </div>
                </div>
            </div>

            <!-- Tickets -->
            <div id="tickets" class="tab-content hidden">
                <div class="max-w-6xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl mb-6">
                        My Tickets
                    </div>

                    <!-- Admin Manage Bookings button -->
                    <div id="adminManageBookings" class="hidden mb-6 text-right">
                        <a href="/pages/bookings.html" class="inline-flex items-center space-x-2 bg-zoo-primary hover:bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
                            </svg>
                            <span>Manage All Bookings</span>
                        </a>
                    </div>

                    <!-- Bookings Container -->
                    <div id="ticketsBookingsContainer">
                        <div class="text-center py-12">
                            <p class="text-gray-500">Loading your bookings...</p>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Membership -->
            <div id="membership" class="tab-content hidden">
                <div class="max-w-7xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Membership
                    </div>
                </div>
            </div>

            <!-- Payment -->
            <div id="payment" class="tab-content hidden">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl mb-6">
                        Billing Info
                    </div>

                    <!-- Payment Method Container -->
                    <div id="paymentMethodContainer">
                        <div class="text-center py-12">
                            <p class="text-gray-500">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/user-account.js"></script>
    <script src="/js/saved-events.js"></script>
    <script src="/js/favourite-animals.js"></script>
    <script src="/js/logout.js"></script>
</body>
</html>
