<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>User Account — Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div class="flex min-h-screen bg-zoo-background">

        <!-- Tabs -->
        <div class="w-64 p-4 flex flex-col items-center bg-zoo-lightpink">
            <!-- image -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-15 h-15 rounded-full mb-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            <!-- name -->
            <p class="font-semibold text-lg mb-6">John Doe</p>

            <!-- buttons -->
            <div class="w-full space-y-2">
                <button class="tab-btn active" data-tab="profile">Your Profile</button>
                <button class="tab-btn" data-tab="animals">Animals</button>
                <button class="tab-btn" data-tab="events">Events</button>
                <button class="tab-btn" data-tab="orders">Orders</button>
                <button class="tab-btn" data-tab="tickets">Tickets</button>
                <button class="tab-btn" data-tab="membership">Membership</button>
                <button class="tab-btn" data-tab="payment">Payment</button>
            </div>
            
        </div>

        <!-- content -->
        <div class="flex-1 p-8">
            <!-- Profile -->
            <div id="profile" class="tab-content">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Profile
                    </div>
                </div>
                
            </div>
            

            <!-- Animals -->
            <div id="animals" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Animal collection
                    </div>
                </div>
            </div>

            <!-- Events -->
            <div id="events" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Events
                    </div>
                </div>
            </div>

            <!-- Orders -->
            <div id="orders" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Orders
                    </div>
                </div>
            </div>

            <!-- Tickets -->
            <div id="tickets" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Tickets
                    </div>
                </div>
            </div>

            <!-- Membership -->
            <div id="membership" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Membership
                    </div>
                </div>
            </div>

            <!-- Payment -->
            <div id="payment" class="tab-content hidden">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zoo-soft text-white font-semibold rounded-lg px-10 py-2 text-center text-xl">
                        Payment
                    </div>
                </div>
            </div>
        </div>
    </div> 
    
    <script src="/js/user-account.js"></script>
</body>
</html>
