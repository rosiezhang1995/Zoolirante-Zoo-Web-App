<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Merchandise | Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">
    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-8">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h1 class="text-4xl font-bold text-zoo-darkbrown mb-2">Purchase Merchandise</h1>
            <p class="text-zoo-lightbrown text-lg">Complete your order securely</p>
        </div>

        <!-- Progress Steps -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center space-x-4">
                <div class="flex items-center">
                    <div id="step1" class="w-10 h-10 bg-zoo-primary text-white rounded-full flex items-center justify-center font-bold">1</div>
                    <span class="ml-2 text-zoo-darkbrown font-semibold">Merch</span>
                </div>
                <div class="w-16 h-1 bg-gray-300"></div>
                <div class="flex items-center">
                    <div id="step2" class="w-10 h-10 bg-gray-300 text-gray-600 rounded-full flex items-center justify-center font-bold">2</div>
                    <span class="ml-2 text-gray-600">Details</span>
                </div>
                <div class="w-16 h-1 bg-gray-300"></div>
                <div class="flex items-center">
                    <div id="step3" class="w-10 h-10 bg-gray-300 text-gray-600 rounded-full flex items-center justify-center font-bold">3</div>
                    <span class="ml-2 text-gray-600">Payment</span>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h3 class="text-xl font-bold text-zoo-darkbrown mb-4">Order Summary</h3>
            <div id="orderSummary" class="mb-4 min-h-[60px]">
                <p class="text-gray-500 text-center py-4">No tickets selected</p>
            </div>
            <div class="border-t border-gray-200 pt-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-zoo-darkbrown font-semibold">Subtotal:</span>
                    <span id="subtotal" class="font-bold text-lg">$0.00</span>
                </div>
                <div class="flex justify-between items-center text-xl font-bold text-zoo-primary border-t pt-3">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>
        </div>

        <!-- S2: Customer Details -->
        <div id="customerDetails" class="bg-white rounded-lg shadow-lg p-6 mb-6 hidden">
            <h2 class="text-2xl font-bold text-zoo-darkbrown mb-4">Your Details</h2>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">Full Name *</label>
                    <input type="text" id="customerName" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                </div>
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">Email *</label>
                    <input type="email" id="customerEmail" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-zoo-darkbrown font-semibold mb-2">Phone Number *</label>
                    <input type="tel" id="customerPhone" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <button id="continueToPayment" class="bg-zoo-primary hover:bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                    Continue to Payment →
                </button>
            </div>
        </div>

        <!-- S3: Payment -->
        <div id="paymentSection" class="bg-white rounded-lg shadow-lg p-6 mb-6 hidden">
            <h2 class="text-2xl font-bold text-zoo-darkbrown mb-4">Payment</h2>

            <!-- New card form -->
            <div id="newCardForm">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-zoo-darkbrown font-semibold mb-2">Card Number</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="16"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-zoo-darkbrown font-semibold mb-2">Cardholder Name</label>
                        <input type="text" id="cardHolder" placeholder="John Smith"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                    </div>
                    <div>
                        <label class="block text-zoo-darkbrown font-semibold mb-2">Expiry (MM/YY)</label>
                        <input type="text" id="cardExpiry" placeholder="12/25" maxlength="5"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                    </div>
                    <div>
                        <label class="block text-zoo-darkbrown font-semibold mb-2">CVV</label>
                        <input type="text" id="cardCVV" placeholder="123" maxlength="3"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                    </div>
                    <div id="saveCardOption" class="hidden md:col-span-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="saveCard" class="mr-2">
                            <span class="text-zoo-darkbrown">Save this payment method for future bookings</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <button id="backToDetails" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg font-semibold transition">
                    ← Back
                </button>
                <button id="completeBooking" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                    Complete Purchase
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
            <div class="text-center">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-2xl font-bold text-zoo-darkbrown mb-2">Merch Ordered!</h2>
                <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                    <p class="text-sm text-green-800">
                        ✓ Status: Confirmed & Paid<br>
                        ✓ Total: <span id="modalTotal" class="font-bold"></span>
                    </p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <!--Update link after creating booking history page-->
                    <button onclick="window.location.href='/pages/merchandise-list.html'" class="bg-zoo-primary hover:bg-amber-700 text-white px-4 py-3 rounded-lg font-semibold transition">
                        Keep Shopping
                    </button>
                    <button onclick="window.location.href='/'" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-3 rounded-lg font-semibold transition">
                        Back Home
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/components/navbar.js" defer></script>
    <script src="/js/components/notification-badge.js"></script>
    <script src="/js/merch-payment.js" defer></script>
</body>
</html>
