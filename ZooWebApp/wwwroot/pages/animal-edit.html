<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Edit Animal — Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background min-h-screen">
    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8">
        <!-- Title -->
        <div class="text-center">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h2 class="text-3xl font-semibold text-zoo-darkbrown mb-5">Edit Animal Details</h2>
        </div>

        <!-- Details -->
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <form action="#" class="space-y-6">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Name</label>
                            <input type="text" id="animalName" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Species / Breed</label>
                            <input type="text" id="species" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Age</label>
                            <input type="number" min="0" id="age" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Gender</label>
                            <select id="gender" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-zoo-primary">
                                <option value="Unknown">Unknown</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Weight (kg)</label>
                            <input type="number" min="0" id="weight" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                        </div>
                    </div>


                    <div>
                        <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Map Image URL</label>
                        <input type="text" id="enclosure" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Animal Image URL</label>
                        <input type="text" id="animalImage" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-zoo-darkbrown mb-2">Short description</label>
                        <textarea id="description" rows="4" placeholder="A short Description of the animal" class="w-full rounded-lg border border-zoo-cream/60 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-zoo-primary"></textarea>
                    </div>

                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <button type="button" id="saveAnimal" class="bg-zoo-primary hover:!bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold shadow-lg transition-colors">Save Animal</button>
                            <a href="animal-list.html"><button type="button" class="bg-transparent border border-zoo-cream text-zoo-brown px-5 py-3 rounded-lg font-medium">Cancel</button></a>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed top-20 right-5 z-[100] bg-green-600 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-500"></div>
    <script src="/js/components/navbar.js"></script>
    <script src="/js/components/notification-badge.js"></script>
    <script src="/js/animal-edit.js"></script>
</body>
</html>
