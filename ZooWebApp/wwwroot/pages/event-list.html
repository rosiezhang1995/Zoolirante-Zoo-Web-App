<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event List</title>
  <link href="/css/site.tailwind.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">
    <!-- nav bar -->
    <!-- Image Banner -->
    <div class="relative w-full h-[180px] md:h-[240px] 2xl:h-[400px] bg-cover bg-no-repeat -mt-2"
        style="background-image: url('/images/events/event-banner.png'); ">
        <!-- logo -->
        <img src="/images/homepage/logo.png" alt="Zoo Logo"
            class="absolute -bottom-8 left-8 w-40 h-auto z-10 " />
    </div>
    <!-- Value badge -->
    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8">
        <div class="text-center ">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h2 class="text-3xl font-semibold text-zoo-darkbrown mb-2">What's On! </h2>
            <p class="text-xl text-zoo-brown mb-5">There's always something fun happening at Zoolirante! </p>
        </div>

        <!-- Event create button -->
        <div class="mb-3 flex justify-end">
            <a href="/pages/event-add.html"><button class="bg-zoo-primary hover:!bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold shadow-lg transition-colors">
            Add New Event
            </button></a>
        </div>
        <!-- Month Header -->
        <div class="text-center mt-10 mb-12">
            <div class="flex items-center justify-center mb-4">
                <div class="flex-1 border-t-2 border-dotted border-gray-400"></div>
                <h2 class="px-8 text-4xl font-semibold text-zoo-primary">September 2025</h2>
                <div class="flex-1 border-t-2 border-dotted border-gray-400"></div>
            </div>
        </div>         
        

        <!-- Event Card, One card per row -->
        <div id="event-list" class="space-y-8"></div>
 
    </div>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/event-list.js"></script>
</body>
</html>
