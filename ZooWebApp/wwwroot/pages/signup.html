<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">

    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8 max-w-lg">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-semibold text-zoo-darkbrown">Create a New Account</h2>
        </div>

        <form id="signupForm" class="bg-zoo-cream rounded-lg p-8 space-y-6 shadow">
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Username *</label>
                <input type="text" id="username" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Password *</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Full Name *</label>
                <input type="text" id="fullName" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Email *</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Phone</label>
                <input type="text" id="phone"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>

            <div class="flex justify-center pt-4 border-t border-gray-200">
                <button type="submit"
                        class="bg-zoo-primary hover:!bg-amber-700 text-white px-8 py-4 rounded-lg font-semibold text-lg shadow-lg transition-colors duration-200">
                    Sign Up
                </button>
            </div>
        </form>
    </div>

    <script src="/js/components/navbar.js"></script>
    <script>
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const user = {
                username: document.getElementById('username').value,
                passwordHash: document.getElementById('password').value, // will be hashed on server
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                isAdmin: false,
                isMember: false
            };

            const response = await fetch('/api/UsersAPI/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });

            if (response.ok) {
                const createdUser = await response.json();
                sessionStorage.setItem('userId', createdUser.userID);
                sessionStorage.setItem('isAdmin', createdUser.isAdmin);
                alert('Signup successful!');
                window.location.href = '/';
            } else {
                alert('Error signing up.');
            }
        });</script>

</body>
</html>
