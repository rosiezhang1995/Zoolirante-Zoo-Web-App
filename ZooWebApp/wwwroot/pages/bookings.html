<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Zoolirante</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">
    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="text-center mb-8">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h1 class="text-4xl font-bold text-zoo-darkbrown mb-2">Booking Management</h1>
            <p id="pageSubtitle" class="text-zoo-lightbrown text-lg">View and manage bookings</p>
        </div>

        <!-- Admin statistics -->
        <div id="adminStats" class="hidden grid md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <p class="text-gray-600 text-sm">Total Bookings</p>
                <p id="totalBookings" class="text-3xl font-bold text-zoo-primary">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <p class="text-gray-600 text-sm">Total Revenue</p>
                <p id="totalRevenue" class="text-3xl font-bold text-green-600">$0.00</p>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <p class="text-gray-600 text-sm">Upcoming Visits</p>
                <p id="upcomingBookings" class="text-3xl font-bold text-blue-600">0</p>
            </div>
        </div>

        <!-- View options -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex flex-wrap gap-4 mb-4">
                <!-- All Bookings, admin only -->
                <button id="viewMyBookingsBtn" class="flex-1 py-3 px-6 rounded-lg bg-zoo-primary text-white font-semibold transition hover:bg-amber-700">
                    <span id="myBookingsText">My Bookings</span>
                </button>

                <!-- Search by email -->
                <button id="viewByEmailBtn" class="flex-1 py-3 px-6 rounded-lg bg-gray-200 text-gray-700 font-semibold transition hover:bg-gray-300">
                    Search by Email
                </button>
            </div>

            <!-- Email search -->
            <div id="emailSearchSection" class="hidden">
                <div class="flex gap-4">
                    <input type="email" id="searchEmail" placeholder="Enter customer email address"
                           class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary">
                    <button id="searchBtn" class="bg-zoo-primary hover:bg-amber-700 text-white px-8 py-3 rounded-lg font-semibold transition">
                        Search
                    </button>
                </div>
            </div>

            <!-- Login Message -->
            <div id="loginMessage" class="hidden text-center py-4">
                <p class="text-gray-600 mb-4">Please log in to view your bookings</p>
                <a href="/pages/login.html" class="inline-block bg-zoo-primary hover:bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                    Log In
                </a>
            </div>
        </div>

        <!-- Bookings List -->
        <div id="bookingsContainer">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading...</p>
            </div>
        </div>
    </div>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/bookings.js"></script>
</body>
</html>
