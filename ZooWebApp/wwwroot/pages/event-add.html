<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create New Event</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">
    <!-- Value badge -->
    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>


    <div class="container mx-auto px-4 py-8">
        <!-- Back button -->
        <button onclick="window.location.href='event-list.html'" class="bg-zoo-primary hover:!bg-amber-700 text-zoo-cream px-4 py-2 rounded-lg transition flex items-center mt-8 mb-5">
            ← Back to Events
        </button>

        <div class="text-center ">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h2 class="text-3xl font-semibold text-zoo-darkbrown mb-2">Create New Event </h2>
        </div>

        <form id="eventForm" class="p-8 space-y-6">
            <!-- Event info -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Title *
                    </label>
                    <input type="text" id="title" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                </div>

                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Location *
                    </label>
                    <input type="text" id="location" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">
                    Description *
                </label>
                <textarea id="description" required rows="4"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition resize-none"></textarea>
            </div>

            <!-- Date & Time -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Date *
                    </label>
                    <input type="date" id="eventDate" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                </div>

                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Time *
                    </label>
                    <input type="time" id="eventTime" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                </div>
            </div>

            <!-- Event image -->
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">
                    Event Image *
                </label>
                <input type="text" id="eventImage" required placeholder="https://example.com/event-image.jpg"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                <p class="text-sm text-zoo-lightbrown mt-1">Add a URL for the event image</p>
            </div>

            <!-- Animals Section -->
            <div class="bg-zoo-cream rounded-lg p-6">
                <h3 class="text-xl font-semibold text-zoo-darkbrown mb-4">Featured Animals</h3>

                <div class="flex gap-4 mb-4">
                    <div class="w-1/2">
                        <select id="animalSelect"
                                class="w-full border border-gray-300 rounded-lg px-4 py-3 text-zoo-darkbrown focus:outline focus:ring-2 focus:ring-orange-500 focus:border-orange-500">
                            <option value="">-- Select an animal --</option>
                        </select>
                    </div>
                    <button type="button" id="addAnimal"
                            class="bg-zoo-primary hover:!bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold transition flex items-center">
                        + Add
                    </button>
                </div>
                <div class="flex gap-4 mb-4">
                    <ul id="selectedAnimals" class="space-y-3 mt-4 max-h-48 text-zoo-brown overflow-y-auto"></ul>
                </div>

            </div>

            <!-- Create Action -->
            <div class="flex justify-center pt-6 border-t border-gray-200">
                <button type="submit"
                        class="bg-zoo-primary hover:!bg-amber-700 text-white px-8 py-4 rounded-lg font-semibold text-lg shadow-lg transition-colors duration-200 flex items-center">
                    Create Event
                </button>
            </div>
        </form>

    </div>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/components/notification-badge.js"></script>
    <script src="/js/event-create.js"></script>
    <script src="/js/event-list.js"></script>



</body>
</html>
