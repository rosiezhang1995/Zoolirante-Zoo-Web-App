<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">
    <h1>Edit Event</h1>

    <div class="container mx-auto px-4 py-8">
        <div class="text-center ">
            <img src="/images/homepage/paw.png" alt="paw icon" class="mx-auto w-16 mb-2" />
            <h2 class="text-3xl title-font font-semibold text-zoo-darkbrown mb-2">Edit Event </h2>
        </div>

        <form id="eventForm" class="p-8 space-y-6">
            <!-- Basic Information -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Title *
                    </label>
                    <input type="text" id="title" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition">
                </div>

                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Location *
                    </label>
                    <input type="text" id="location" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition">
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">
                    Description *
                </label>
                <textarea id="description" required rows="4"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition resize-none"></textarea>
            </div>

            <!-- Date and Time -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Date *
                    </label>
                    <input type="date" id="eventDate" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition">
                </div>

                <div>
                    <label class="block text-zoo-darkbrown font-semibold mb-2">
                        Event Time *
                    </label>
                    <input type="time" id="eventTime" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition">
                </div>
            </div>

            <!-- Event Image -->
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">
                    Event Image *
                </label>
                <input type="text" id="eventImage"  required placeholder="https://example.com/event-image.jpg"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-zoo-primary focus:border-zoo-primary transition">
                <p class="text-sm text-gray-500 mt-1">Add a URL for the event image</p>
            </div>

            <!-- Animals Section -->
            <div class="bg-zoo-cream rounded-lg p-6">
                <h3 class="text-xl font-semibold text-zoo-darkbrown mb-4">Featured Animals</h3>

                <div class="flex gap-4 mb-4">
                    <div class="flex-1">
                        <select id="animalSelect">
                            <option value="">-- Select an animal --</option>
                        </select>
                    </div>
                    <button type="button" id="addAnimal"
                            class="bg-zoo-primary hover:!bg-amber-700 text-white px-8 py-4 rounded-lg font-semibold text-lg shadow-lg transition-colors duration-200 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Add
                    </button>
                </div>
                <ul id="selectedAnimals"></ul>

            </div>

            <!-- Form Actions -->
            <div class="flex justify-center pt-6 border-t border-gray-200">
                <button type="submit"
                        class="bg-zoo-primary hover:!bg-amber-700 text-white px-8 py-4 rounded-lg font-semibold text-lg shadow-lg transition-colors duration-200 flex items-center">
                    Update Event
                </button>
            </div>
        </form>

    </div>

    <script src="/js/event-edit.js"></script>
</body>
</html>
