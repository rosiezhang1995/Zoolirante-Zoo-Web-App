<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
</head>
<body>
    <h1>Edit Event</h1>

    <form id="eventForm">
        <label>Title: <input type="text" id="title" required></label><br>
        <label>Description: <input type="text" id="description" required></label><br>
        <label>Date: <input type="date" id="eventDate" required></label><br>
        <label>Time: <input type="time" id="eventTime" required></label><br>
        <label>Image URL: <input type="text" id="eventImage"></label><br>
        <label>Location: <input type="text" id="location" required></label><br>
        <button type="submit">Save</button>
    </form>

    <script src="/js/event-edit.js"></script>
</body>
</html>
