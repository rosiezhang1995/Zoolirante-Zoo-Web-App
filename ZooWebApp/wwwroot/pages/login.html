<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="/css/site.tailwind.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-zoo-background">

    <div class="bg-zoo-cream text-center py-4 text-zoo-brown font-semibold tracking-wide text-lg shadow">
        Zoolirante – A World of Wildlife, A Lifetime of Wonder
    </div>

    <div class="container mx-auto px-4 py-8 max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-semibold text-zoo-darkbrown">Login to Your Account</h2>
        </div>

        <form id="loginForm" class="bg-zoo-cream rounded-lg p-8 space-y-6 shadow">
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Username *</label>
                <input type="text" id="username" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-zoo-darkbrown font-semibold mb-2">Password *</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
            </div>

            <div class="flex justify-center pt-4 border-t border-gray-200">
                <button type="submit"
                        class="bg-zoo-primary hover:!bg-amber-700 text-white px-8 py-4 rounded-lg font-semibold text-lg shadow-lg transition-colors duration-200">
                    Login
                </button>
            </div>
        </form>
    </div>

    <script src="/js/components/navbar.js"></script>
    <script>document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const loginRequest = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };

    const response = await fetch('/api/UsersAPI/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(loginRequest)
    });

    if (response.ok) {
        const data = await response.json();
        sessionStorage.setItem('userId', data.userID);
        sessionStorage.setItem('isAdmin', data.isAdmin);
        alert(`Welcome ${data.username}!`);
        window.location.href = '/';
    } else {
        alert('Invalid username or password.');
    }
});</script>

</body>
</html>
